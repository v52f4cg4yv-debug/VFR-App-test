<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aviation Weather Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    #topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="topbar">✈️ Aviation Map</div>
<div id="map"></div>

<script>
const AIRLABS_API_KEY = "YOUR_AIRLABS_KEY";
const WORKER_URL = "YOUR_WORKER_URL";

// ---------------- MAP ----------------
const map = L.map("map").setView([41.7, -86.9], 9);

const sectional = L.tileLayer(
  "https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/VFR_Sectional/MapServer/WMTS/tile/1.0.0/VFR_Sectional/default/default028mm/{z}/{y}/{x}",
  {maxZoom:12}
).addTo(map);

const airportLayer = L.layerGroup().addTo(map);

// ---------------- COLORS ----------------
function getColor(cat) {
  if (cat === "VFR") return "green";
  if (cat === "MVFR") return "blue";
  if (cat === "IFR") return "red";
  if (cat === "LIFR") return "purple";
  return "gray";
}

// ---------------- DATA ----------------
async function loadData(lat, lon){
  try{
    // 1️⃣ Get airports
    const res = await fetch(
      `https://airlabs.co/api/v9/nearby?lat=${lat}&lng=${lon}&distance=80&api_key=${661ae3f2-835e-469d-ad8b-c1d88bbef712}`
    );
    const data = await res.json();

    const airports = data.response.airports.slice(0,10);

    const ids = airports.map(a=>a.icao_code).join(",");

    // 2️⃣ Get METAR via YOUR backend
    const wxRes = await fetch(`${https://vfrmap.v52f4cg4yv.workers.dev/}?ids=${encodeURIComponent(ids)}`);
    const wxData = await wxRes.json();

    airportLayer.clearLayers();

    airports.forEach(a => {
      const wx = wxData.data.find(x => x.icao === a.icao_code);

      const cat = wx?.flight_category || "Unknown";
      const raw = wx?.raw_text || "";

      L.circleMarker([a.lat,a.lng],{
        radius:7,
        fillColor:getColor(cat),
        color:"white",
        weight:1,
        fillOpacity:0.9
      })
      .addTo(airportLayer)
      .bindPopup(`
        <b>${a.icao_code}</b><br>
        ${cat}<br>
        ${raw}
      `);
    });

  }catch(e){
    console.error(e);
  }
}

// ---------------- LOCATION ----------------
navigator.geolocation.getCurrentPosition(pos=>{
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  map.setView([lat,lon],9);
  loadData(lat,lon);

},()=>{
  loadData(41.7,-86.9);
});

</script>

</body>
</html>
