<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VFR Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="status">Loading airports...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // IMPORTANT:
    // If you ever pasted your AirLabs key publicly, regenerate it in AirLabs dashboard
    // and replace it here with the new one.
    const AIRLABS_API_KEY = "661ae3f2-835e-469d-ad8b-c1d88bbef712";

    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    const map = L.map("map").setView([41.7, -86.9], 8);

    // Street base layer
    const street = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      { attribution: "© OpenStreetMap" }
    );

    // Your existing sectional layer
    const sectional = L.tileLayer(
      "https://tile.skyvector.com/tiles/301/{z}/{x}/{y}.jpg",
      { attribution: "SkyVector" }
    );

    street.addTo(map);

    L.control.layers(
      {
        "Map": street,
        "Sectional": sectional
      },
      {},
      { collapsed: false }
    ).addTo(map);

    const layer = L.layerGroup().addTo(map);

    function getColor(cat) {
      if (cat === "VFR") return "green";
      if (cat === "MVFR") return "blue";
      if (cat === "IFR") return "red";
      if (cat === "LIFR") return "purple";
      return "gray";
    }

    async function getCategoryForAirport(icao) {
      try {
        // MetarCentral docs show /api/weather/{icao}
        // and sample decoded JSON including flight_category.
        const res = await fetch(`https://metarcentral.com/api/weather/${encodeURIComponent(icao)}`);

        if (!res.ok) {
          throw new Error(`MetarCentral HTTP ${res.status}`);
        }

        const data = await res.json();
        console.log(`MetarCentral response for ${icao}:`, data);

        // Based on the docs snippet:
        // { results: 1, data: [ { flight_category: "VFR", raw_text: "...", ... } ] }
        const item = Array.isArray(data?.data) ? data.data[0] : null;

        return {
          category: item?.flight_category || "Unknown",
          raw: item?.raw_text || "No METAR text available"
        };
      } catch (err) {
        console.error(`Category fetch failed for ${icao}:`, err);
        return {
          category: "Unknown",
          raw: "Category/METAR unavailable in browser"
        };
      }
    }

    async function loadData(lat, lon) {
      try {
        setStatus("Finding airports...");

        const airlabsUrl =
          `https://airlabs.co/api/v9/nearby?lat=${lat}&lng=${lon}&distance=80&api_key=${AIRLABS_API_KEY}`;

        const res = await fetch(airlabsUrl);

        if (!res.ok) {
          throw new Error(`AirLabs HTTP ${res.status}`);
        }

        const data = await res.json();
        console.log("AirLabs response:", data);

        // AirLabs Nearby docs show an airports array on success.
        const airports =
          Array.isArray(data.airports) ? data.airports.slice(0, 10) :
          Array.isArray(data.response?.airports) ? data.response.airports.slice(0, 10) :
          [];

        if (!airports.length) {
          setStatus("No nearby airports returned");
          console.error("Unexpected AirLabs payload:", data);
          return;
        }

        layer.clearLayers();
        setStatus("Loading airport categories...");
