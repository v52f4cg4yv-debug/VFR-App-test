<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFR Map USA</title>

<!-- ✅ Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- ✅ Marker Cluster CSS -->

<style>
html, body, #map {
  height: 100%;
  margin: 0;
  font-family: Arial;
}

#status {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1000;
  background: black;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
}
</style>

<body>

<!-- ✅ Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>
