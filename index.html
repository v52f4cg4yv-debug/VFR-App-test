<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aviation Weather Map</title>

    <!-- Leaflet CSS -->
    https://unpkg.com/leaflet/dist/leaflet.css

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 6px 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div id="status">Loading...</div>
<div id="map"></div>

<!-- Leaflet JS -->
https://unpkg.com/leaflet/dist/leaflet.jsscript>

<script>
let map, userMarker, airportLayer;

// ✅ FAA Sectional Layer (REAL charts)
const sectionalLayer = L.tileLayer(
    'https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/VFR_Sectional/MapServer/WMTS/tile/1.0.0/VFR_Sectional/default/default028mm/{z}/{y}/{x}',
    {
        attribution: 'FAA Sectional Charts',
        minZoom: 8,
        maxZoom: 12,
        opacity: 0.9
    }
);

// ✅ Dark map (backup)
const darkMap = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
    }
);

function initMap(lat, lon) {
    map = L.map('map', {
        center: [lat, lon],
        zoom: 9,
        layers: [sectionalLayer] // ✅ default = sectional!
    });

    airportLayer = L.layerGroup().addTo(map);

    const baseMaps = {
        "FAA Sectional": sectionalLayer,
        "Dark Map": darkMap
    };

    const overlayMaps = {
        "Weather (METAR)": airportLayer
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);

    userMarker = L.marker([lat, lon])
        .addTo(map)
        .bindPopup("You are here")
        .openPopup();
}

// ✅ Category colors
function getCategoryColor(cat) {
    if (cat === "VFR") return "green";
    if (cat === "MVFR") return "blue";
    if (cat === "IFR") return "red";
    if (cat === "LIFR") return "purple";
    return "gray";
}

// ✅ METAR fetch
async function getAviationData(lat, lon) {
    const url = `https://api.aviationapi.com/v1/metar?lat=${lat}&lon=${lon}&radius=80`;

    try {
        airportLayer.clearLayers();

        const res = await fetch(url);
        const data = await res.json();

        document.getElementById("status").textContent = "Live METAR loaded";

        Object.values(data).forEach(airport => {
            if (!airport || !airport.flight_category) return;

            const color = getCategoryColor(airport.flight_category);

            const marker = L.circleMarker(
                [airport.latitude, airport.longitude],
                {
                    radius: 7,
                    fillColor: color,
                    color: "white",
                    weight: 1.5,
                    fillOpacity: 0.9
                }
            ).bindPopup(`
                <b>${airport.station_id}</b><br>
                ${airport.raw_text || ""}
            `);

            marker.addTo(airportLayer);
        });

    } catch (e) {
        console.error(e);
        document.getElementById("status").textContent = "Error loading weather";
    }
}

// ✅ Location
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        initMap(lat, lon);
        getAviationData(lat, lon);

    }, () => {
        const lat = 41.7075;
        const lon = -86.8950;

        initMap(lat, lon);
        getAviationData(lat, lon);
    });
}
</script>

</body>
</html>
