<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VFR Map USA</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Marker Cluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body, #map {
  height: 100%;
  margin: 0;
  font-family: Arial;
}

#topbar {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px;
  border-radius: 10px;
  z-index: 1000;
}

#controls {
  position: absolute;
  top: 60px;
  left: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 10px;
  z-index: 1000;
}

#favorites {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 200px;
  overflow: auto;
  z-index: 1000;
}
</style>
</head>

<body>

<div id="topbar">✈️ VFR Map USA</div>

<div id="controls">
  <button id="refreshBtn">🔄 Refresh</button>
  <button id="nearestBtn">🎯 Nearest</button>
  <button id="clearRouteBtn">✈️ Clear</button>

  <div id="status">Loading…</div>

  <div>
    From: <span id="routeFrom">—</span><br>
    To: <span id="routeTo">—</span><br>
    Distance: <span id="routeDistance">—</span><br>
    Heading: <span id="routeHeading">—</span>
  </div>
</div>

<div id="favorites">
  <b>⭐ Favorites</b>
  <div id="favList">None</div>
</div>

<div id="map"></div>

<!-- ✅ SCRIPTS (THIS WAS YOUR MAIN ISSUE) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>

</body>
</html>
