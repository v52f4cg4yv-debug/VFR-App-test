<!DOCTYPE html>
<html lang="en">
UTF-8" /><head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VFR Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: black;
      color: white;
      padding: 8px;
      border-radius: 8px;
      font-family: Arial;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="status">Loading airports...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const AIRLABS_API_KEY = "REPLACE_WITH_YOUR_NEW_KEY";

    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    const map = L.map("map").setView([41.7, -86.9], 8);

    const street = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png");
    const sectional = L.tileLayer("https://tile.skyvector.com/tiles/301/{z}/{x}/{y}.jpg");

    street.addTo(map);

    L.control.layers({
      "Map": street,
      "Sectional": sectional
    }).addTo(map);

    const layer = L.layerGroup().addTo(map);

    function getColor(cat) {
      if (cat === "VFR") return "green";
      if (cat === "MVFR") return "blue";
      if (cat === "IFR") return "red";
      if (cat === "LIFR") return "purple";
      return "gray";
    }

    // TEMP classification (random until backend added)
    function fakeCategory() {
      const types = ["VFR", "MVFR", "IFR"];
      return types[Math.floor(Math.random() * types.length)];
    }

    async function loadData(lat, lon) {
      try {
        setStatus("Finding airports...");

        const res = await fetch(
          `https://airlabs.co/api/v9/nearby?lat=${lat}&lng=${lon}&distance=80&api_key=${AIRLABS_API_KEY}`
        );

        const data = await res.json();
        console.log("AirLabs response:", data);

        const airports = data.response?.airports || data.airports || [];

        if (!airports.length) {
          setStatus("No airports found");
          return;
        }

        const top = airports.slice(0, 10);

        layer.clearLayers();

        top.forEach(a => {
          if (!a.icao_code) return;

          const cat = fakeCategory(); // placeholder

          L.circleMarker([a.lat, a.lng], {
            radius: 7,
            fillColor: getColor(cat),
            color: "white",
            weight: 1,
            fillOpacity: 0.9
          })
          .addTo(layer)
          .bindPopup(`
            <b>${a.name}</b><br>
            ${a.icao_code}<br>
            ${cat}
          `);
        });

        setStatus("Loaded ✅");

      } catch (e) {
        console.error(e);
        setStatus("Error loading data");
      }
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        map.setView([lat, lon], 9);
        loadData(lat, lon);
      });
    } else {
      loadData(41.7, -86.9);
    }

  </script>

</body>
</html>
