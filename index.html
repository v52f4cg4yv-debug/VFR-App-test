<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VFR Map</title>

  <!-- ✅ Leaflet CSS (REQUIRED) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- ✅ Map styling (CRITICAL for visibility) -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: black;
      color: white;
      padding: 8px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>

  <body>

  <!-- Status text -->
  <div id="status">Loading airports...</div>

  <!-- Map container -->
  <div id="map"></div>

  <!-- ✅ Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ✅ Your app code -->
  <script>

    const AIRLABS_API_KEY = "YOUR_API_KEY_HERE";

    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    // Create map
    const map = L.map("map").setView([41.7, -86.9], 8);

    // Base map layer
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const layer = L.layerGroup().addTo(map);

    function getColor(cat) {
      if (cat === "VFR") return "green";
      if (cat === "MVFR") return "blue";
      if (cat === "IFR") return "red";
      if (cat === "LIFR") return "purple";
      return "gray";
    }

    async function loadData(lat, lon) {
      try {
        setStatus("Finding airports...");

        const res = await fetch(
          `https://airlabs.co/api/v9/nearby?lat=${lat}&lng=${lon}&distance=80&api_key=${AIRLABS_API_KEY}`
        );

        const data = await res.json();

        // ✅ FIXED HERE
        const airports = data.airports.slice(0, 10);

        const ids = airports.map(a => a.icao_code).join(",");

        setStatus("Loading METAR...");

        const metarRes = await fetch(
          `https://aviationweather.gov/api/data/metar?ids=${ids}&format=json`
        );

        const metars = await metarRes.json();

        layer.clearLayers();

        airports.forEach(a => {
          const m = metars.find(x => x.icaoId === a.icao_code);

          const cat = m?.flight_category || "Unknown";
          const raw = m?.rawOb || "";

          L.circleMarker([a.lat, a.lng], {
            radius: 6,
            fillColor: getColor(cat),
            color: "white",
            weight: 1,
            fillOpacity: 0.9
          })
          .addTo(layer)
          .bindPopup(`
            <b>${a.name}</b><br>
            ${a.icao_code}<br>
            ${cat}<br>
            ${raw}
          `);
        });

        setStatus("Done ✅");

      } catch (e) {
        console.error(e);
        setStatus("Error loading data");
      }
    }

    // Get location
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        map.setView([lat, lon], 9);
        loadData(lat, lon);
      });
    } else {
      loadData(41.7, -86.9);
    }

  </script>

</body>
    

</html>
