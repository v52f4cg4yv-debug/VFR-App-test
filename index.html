<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>VFR Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    #topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: black;
      color: white;
      padding: 8px;
      border-radius: 10px;
    }

    #favorites {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 1000;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      max-height: 200px;
      overflow: auto;
      font-size: 14px;
    }

    button {
      margin: 2px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="topbar">✈️ VFR Map</div>

<div id="favorites">
  <b>⭐ Favorites</b>
  <div id="favList"></div>
</div>

<div id="map"></div>

<script src="app.js"></script>

</body>
</html>
